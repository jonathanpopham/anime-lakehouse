name: CI Gate Lattice

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  gates:
    # GitHub-hosted, deliberately. The gate lattice is pure Python and DuckDB and
    # needs no special hardware, so there is no reason to expose a self-hosted
    # runner to arbitrary pull-request code on a public repository.
    # To run on your own hardware instead, see docs/ci-linux-box.md and swap
    # this for: runs-on: [self-hosted, linux]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python venv
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev]"

      - name: Seed bronze from the committed catalog snapshot
        # CI does NOT hit the AniList API. The catalog is ranked by live
        # popularity, so a fresh ingest returns a different set of titles every
        # day, which would make the goldens gate fail for reasons unrelated to
        # the code. tests/fixtures/anilist_media_snapshot.parquet is the exact
        # snapshot the goldens were frozen against, so CI is hermetic and the
        # goldens mean what they claim. Refresh it deliberately, alongside the
        # goldens, via `make ingest && python scripts/freeze_goldens.py`.
        run: |
          mkdir -p "data/bronze/anilist_media/ingest_date=fixture"
          cp tests/fixtures/anilist_media_snapshot.parquet \
             "data/bronze/anilist_media/ingest_date=fixture/media.parquet"
          .venv/bin/python -m anime_lakehouse.ingest.simulate_playback

      - name: Build warehouse
        run: cd transform && ../.venv/bin/dbt build --profiles-dir .

      - name: Run gate lattice
        run: ci/gate.sh --robot --trigger ci | tee gate-output.ndjson

      - name: Upload run record
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-run-record
          path: data/labboard/runs/*.json
          retention-days: 30

      - name: Upload NDJSON log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-ndjson-log
          path: gate-output.ndjson
          retention-days: 30
